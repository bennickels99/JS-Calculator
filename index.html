<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <h2>Basic Calculator</h2>
    <!-- have drop down menu to swap to scientific calculator-->
    <!-- use ipad to create tab icon -->
    <!-- use keyboard for input -->
    <!-- click effect for buttons -->
    <!-- Scalable text so answer fits in display -->

    <!-- Display Window will go on top and be right aligned-->
    <div id = "buttons"> <!-- set display property to grid -->
        <div id = "display">0</div>
        <div><button type = "button" class = "erase" id = "delete">&lt</button></div>
        <div><button type = "button" class = "erase" id = "all clear">AC</button></div>
        <div><button type = "button" class = "modifier" id = "percent">%</button></div>
        <div><button type = "button" class = "modifier" id = "signSwap">+/-</button></div>
        <div><button type = "button" class = "number" id = "seven">7</button></div>
        <div><button type = "button" class = "number" id = "eight">8</button></div>
        <div><button type = "button" class = "number" id = "nine">9</button></div>
        <div><button type = "button" class = "operation" id = "divide">&divide</button></div>
        <div><button type = "button" class = "number" id = "four">4</button></div>
        <div><button type = "button" class = "number" id = "five">5</button></div>
        <div><button type = "button" class = "number" id = "six">6</button></div>
        <div><button type = "button" class = "operation" id = "multiply">&times</button></div>
        <div><button type = "button" class = "number" id = "one">1</button></div>
        <div><button type = "button" class = "number" id = "two">2</button></div>
        <div><button type = "button" class = "number" id = "three">3</button></div>
        <div><button type = "button" class = "operation" id = "subtract">-</button></div>
        <div><button type = "button" class = "number" id = "zero">0</button></div>
        <div><button type = "button" class = "modifier" id = "decimal">.</button></div>
        <div><button type = "button" class = "equals" id = "equal">=</button></div>
        <div><button type = "button" class = "operation" id = "add">+</button></div>
    </div>
</body>
</html>
